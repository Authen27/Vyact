    notes: >
      Currently GoogleButton renders null when isCloudEnabled()=false (local dev only).
      On production the button already shows because PROD fallback is always set.
      Required changes — ALL in react/src/:
        1. GoogleButton.tsx: remove the isCloudEnabled guard. Always render.
           Add an error state so a misconfigured provider shows a message, not a crash.
        2. SignIn.tsx: move GoogleButton ABOVE the email/password form as primary CTA.
           Add a divider ("or sign in with email") below it.
        3. SignUp.tsx: same — Google first, email form second.
        4. ResetPassword.tsx: Google button already present; no layout change needed.
      See BRIEF_google_sso_mandatory.md for the exact code to write.

  - id: google_sso_provider_config
    title: "Configure Google OAuth provider in Supabase + redirect URLs [HUMAN]"
    priority: urgent
    wave: 1
    status: not-started
    owner: human
    safe: "no"
    depends_on: [admin_lockdown]
    notes: >
      HUMAN DASHBOARD STEP — cannot be done in code.
      Do this AFTER admin_lockdown ships.

      Step 1 — Google Cloud Console (console.cloud.google.com):
        - Create/select a project named "Vyact"
        - APIs & Services -> Credentials -> Create OAuth 2.0 Client ID
        - Application type: Web application
        - Name: Vyact Auth
        - Authorised redirect URI (exact, one per line):
            https://dmxqkvploojokffuhxnz.supabase.co/auth/v1/callback
        - Copy the Client ID and Client Secret

      Step 2 — Supabase dashboard (supabase.com/dashboard/project/dmxqkvploojokffuhxnz):
        - Authentication -> Providers -> Google
        - Toggle Enabled ON
        - Paste Client ID and Client Secret
        - Save

      Step 3 — Supabase URL Configuration:
        - Authentication -> URL Configuration -> Redirect URLs
        - Add (one per line):
            https://vyact-twentyx.vercel.app/auth/verified
            https://vyact-admin.vercel.app/auth/verified
            http://localhost:5173/auth/verified  (for local dev)
        - Save

      Step 4 — Verify:
        - Open https://vyact-twentyx.vercel.app/auth/sign-in
        - Click "Continue with Google"
        - Should redirect to Google consent screen
        - After consent, should land on /dashboard


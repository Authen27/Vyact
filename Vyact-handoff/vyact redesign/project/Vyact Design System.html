<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vyact · Neumorphic Fluid — Design System</title>
<link rel="stylesheet" href="vyact-tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--vy-canvas); }
  html { scroll-behavior: smooth; }
  #root { min-height: 100vh; }

  /* ── micro-interaction keyframes ── */
  @keyframes vy-spin { to { transform: rotate(360deg); } }
  .vy-spin {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid currentColor; border-top-color: transparent;
    opacity: .8; animation: vy-spin .7s linear infinite;
  }
  @keyframes vy-shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-5px); } 40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); } 80% { transform: translateX(2px); }
  }
  @keyframes vy-confetti {
    0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--cx), var(--cy)) rotate(var(--cr)) scale(.6); }
  }
  @keyframes vy-draw { to { stroke-dashoffset: 0; } }

  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#131922"/>
    <rect x="30" y="30" width="40" height="40" rx="10" fill="url(#g)"/>
    <path d="M38 42l12 18 12-18" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  </svg>
</template>

</html>

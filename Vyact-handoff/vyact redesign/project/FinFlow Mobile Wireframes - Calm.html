<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FinFlow · Mobile Wireframes — Calm</title>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; min-height: 100vh; font-family: 'Inter Tight', system-ui, sans-serif; }
    .wf-bezel-wrap { display: grid; place-items: center; width: 100%; height: 100%; padding: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mobile-wireframes/wf-calm.jsx"></script>
<script type="text/babel" src="mobile-wireframes/screens-calm.jsx"></script>

<script type="text/babel" data-presets="env,react">

// 460 × 900 artboards comfortably fit one 390×820 phone with a little air.
const W = 460, H = 900;
const Stage = ({ children }) => <div className="wf-bezel-wrap">{children}</div>;

function Cover() {
  return (
    <div className="ff" data-screen-label="00 Cover" style={{
      width: '100%', height: '100%', background: 'var(--ff-canvas)',
      padding: 64, display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
      position: 'relative', overflow: 'hidden',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
        <div style={{ fontFamily: 'var(--ff-mono)', fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ff-ink-3)' }}>
          FinFlow · Mobile Wireframes — Calm v1 · May 2026
        </div>
        <div style={{ fontFamily: 'var(--ff-mono)', fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ff-ink-3)' }}>
          v2 · alternative density
        </div>
      </div>

      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24 }}>
          <CALM.Pip size={56} mood="calm"/>
          <span style={{ fontFamily: 'var(--ff-mono)', fontSize: 12, letterSpacing: '0.16em', color: 'var(--ff-coral)' }}>ƒ · breathing room over density</span>
        </div>
        <h1 style={{
          fontFamily: 'var(--ff-serif)', fontSize: 88, lineHeight: 0.98, fontWeight: 400,
          letterSpacing: '-0.03em', color: 'var(--ff-ink)', maxWidth: '14ch', margin: 0,
        }}>
          Less on the<br/><em style={{ color: 'var(--ff-coral)' }}>screen.</em> More in the moment.
        </h1>
        <p style={{ marginTop: 28, fontSize: 18, lineHeight: 1.55, color: 'var(--ff-ink-2)', maxWidth: '52ch' }}>
          A second pass at the FinFlow mobile app — same flows, same tokens, designed for calm. One focal
          element per screen. Bigger numerals, larger touch targets, fewer cards stacked on top of each
          other. The dense v1 still ships for power users; this is the default people will recommend to
          their parents.
        </p>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20, paddingTop: 28, borderTop: '1px solid var(--ff-line-2)' }}>
        {[
          ['Device',     '390 × 820', 'iPhone 16 Pro · Pixel 8 Pro'],
          ['Body type',  '16 px',     'up from 13.5 px'],
          ['Hero numerals', '56–96 px', 'Newsreader, light tracking'],
          ['Cards / screen', '1–3',     'down from 5–7'],
        ].map(([k, v, n]) => (
          <div key={k}>
            <div style={{ fontFamily: 'var(--ff-mono)', fontSize: 11, color: 'var(--ff-coral)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>{k}</div>
            <div style={{ marginTop: 8, fontFamily: 'var(--ff-serif)', fontSize: 24, letterSpacing: '-0.02em' }}>{v}</div>
            <div style={{ marginTop: 4, fontFamily: 'var(--ff-mono)', fontSize: 11, color: 'var(--ff-ink-3)', letterSpacing: '0.04em' }}>{n}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="cover"
        title="00 · Cover"
        subtitle="An alternate take on the mobile app — fewer elements per screen, larger numerals, deliberate whitespace. Same flows and design tokens as the dense v1; same components in the design system. Just easier on the eyes.">
        <DCArtboard id="cover" label="Manifesto" width={1280} height={780}><Cover/></DCArtboard>
      </DCSection>

      <DCSection
        id="onboarding"
        title="01 · Welcome"
        subtitle="The first impression — Pip, the headline, two choices. Nothing else competes.">
        <DCArtboard id="cios-welcome" label="iOS · Welcome" width={W} height={H} screenLabel="01 iOS Welcome"><Stage><CIOS.Welcome/></Stage></DCArtboard>
        <DCArtboard id="cand-welcome" label="Android · Welcome" width={W} height={H} screenLabel="01 Android Welcome"><Stage><CAND.Welcome/></Stage></DCArtboard>
      </DCSection>

      <DCSection
        id="home"
        title="02 · Home"
        subtitle="The Pulse score is the screen, sized large enough to read from across the room. Below it: one thing Pip noticed today. That's the whole dashboard. Everything else lives behind a tap.">
        <DCArtboard id="cios-home" label="iOS · Home" width={W} height={H} screenLabel="02 iOS Home"><Stage><CIOS.Home/></Stage></DCArtboard>
        <DCArtboard id="cand-home" label="Android · Home" width={W} height={H} screenLabel="02 Android Home"><Stage><CAND.Home/></Stage></DCArtboard>
      </DCSection>

      <DCSection
        id="activity"
        title="03 · Activity"
        subtitle="Transactions as a quiet list. No coloured pills, no emoji, no per-row dividers competing with the amounts. Just name, context, amount — sized for thumb-tapping while you walk.">
        <DCArtboard id="cios-act" label="iOS · Activity" width={W} height={H} screenLabel="03 iOS Activity"><Stage><CIOS.Activity/></Stage></DCArtboard>
        <DCArtboard id="cand-act" label="Android · Activity" width={W} height={H} screenLabel="03 Android Activity"><Stage><CAND.Activity/></Stage></DCArtboard>
      </DCSection>

      <DCSection
        id="plan"
        title="04 · Plan"
        subtitle="The AI tab. Pip's one paragraph, then three actions in order of impact — number-stamped so you can argue with them. Every recommendation has a clear ‘do it' arrow to the right.">
        <DCArtboard id="cios-plan" label="iOS · Plan" width={W} height={H} screenLabel="04 iOS Plan"><Stage><CIOS.Plan/></Stage></DCArtboard>
        <DCArtboard id="cand-plan" label="Android · Plan" width={W} height={H} screenLabel="04 Android Plan"><Stage><CAND.Plan/></Stage></DCArtboard>
      </DCSection>

      <DCSection
        id="money"
        title="05 · Money — sub-views"
        subtitle="The four Money tabs each lead with a single hero number, then drop into a calm breakdown. The segmented control stays consistent across all four so the location is never in doubt.">
        <DCArtboard id="cios-wealth" label="iOS · Net worth" width={W} height={H} screenLabel="05 iOS Wealth"><Stage><CIOS.Wealth/></Stage></DCArtboard>
        <DCArtboard id="cand-wealth" label="Android · Net worth" width={W} height={H} screenLabel="05 Android Wealth"><Stage><CAND.Wealth/></Stage></DCArtboard>

        <DCArtboard id="cios-bud" label="iOS · Budgets" width={W} height={H} screenLabel="05 iOS Budgets"><Stage><CIOS.Budgets/></Stage></DCArtboard>
        <DCArtboard id="cand-bud" label="Android · Budgets" width={W} height={H} screenLabel="05 Android Budgets"><Stage><CAND.Budgets/></Stage></DCArtboard>

        <DCArtboard id="cios-goals" label="iOS · Goals" width={W} height={H} screenLabel="05 iOS Goals"><Stage><CIOS.Goals/></Stage></DCArtboard>
        <DCArtboard id="cand-goals" label="Android · Goals" width={W} height={H} screenLabel="05 Android Goals"><Stage><CAND.Goals/></Stage></DCArtboard>
      </DCSection>

      <DCSection
        id="add"
        title="06 · Add transaction"
        subtitle="The most-touched screen in the app. The amount is the entire screen — 88px serif numerals, centred. Everything else is a calm list. The keypad keys are 52px tall (above the 44pt minimum) and rest on a warm canvas tone so they don't shout.">
        <DCArtboard id="cios-add" label="iOS · Add" width={W} height={H} screenLabel="06 iOS Add"><Stage><CIOS.AddTxn/></Stage></DCArtboard>
        <DCArtboard id="cand-add" label="Android · Add" width={W} height={H} screenLabel="06 Android Add"><Stage><CAND.AddTxn/></Stage></DCArtboard>
      </DCSection>

      <DCSection
        id="you"
        title="07 · You"
        subtitle="Profile + settings as a breathing list. Three category labels, never more than four rows under each. Anything urgent (a bank link needing attention) earns a coral value tag — used sparingly, so it actually reads as urgent.">
        <DCArtboard id="cios-you" label="iOS · You" width={W} height={H} screenLabel="07 iOS You"><Stage><CIOS.You/></Stage></DCArtboard>
        <DCArtboard id="cand-you" label="Android · You" width={W} height={H} screenLabel="07 Android You"><Stage><CAND.You/></Stage></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

name: Deploy

# Auto-deploy both apps to Vercel on push to main, after applying any
# pending Supabase migrations.
# Setup needed once (see DEPLOY.md):
#   • In each Vercel project: Settings → Git → connect this repo
#   • In GitHub: add these secrets at Settings → Secrets and variables → Actions:
#       VERCEL_TOKEN              (account-level, https://vercel.com/account/tokens)
#       VERCEL_ORG_ID             (team or personal scope id)
#       VERCEL_CONSUMER_PROJECT_ID
#       VERCEL_ADMIN_PROJECT_ID
#       VITE_SUPABASE_URL         (Supabase project URL — injected at build time)
#       VITE_SUPABASE_ANON_KEY    (Supabase anon key — injected at build time)
#       VITE_APP_URL              (consumer app URL, e.g. https://react-taupe-xi.vercel.app)
#       SUPABASE_ACCESS_TOKEN     (personal access token — https://supabase.com/dashboard/account/tokens)
#       SUPABASE_PROJECT_REF      (the ref shown in the project URL, e.g. abcd1234efgh5678)
#       SUPABASE_DB_PASSWORD      (DB password for the production project — Settings → Database)

on:
  push:
    branches: [main]
  workflow_dispatch:        # manual trigger from GitHub UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # TD-20 (PR #16) — apply any pending Supabase migrations BEFORE the apps
  # deploy. `supabase db push` is idempotent against the remote
  # `supabase_migrations.schema_migrations` tracker: it only applies
  # migrations the tracker hasn't already recorded. The TD-20 baseline
  # itself is pre-inserted into the tracker so production isn't touched
  # on the first run after PR #16.
  db-migrations:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    environment: production-database
    # Best-effort: a Supabase auth/link hiccup (e.g. a rotated
    # SUPABASE_ACCESS_TOKEN) must NEVER block an app deploy. The app jobs
    # depend on this with `if: always()` so they ship regardless; a failure
    # here only means *pending* migrations weren't auto-applied (the apply
    # step is idempotent and re-runs cleanly once the secret is refreshed).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      # NOTE: do NOT use `version: latest` — it hits the unauthenticated GitHub
      # API to look up the latest release and gets rate-limited on shared
      # runners. Pin a specific CLI version and bump it deliberately.
      - uses: supabase/setup-cli@v1
        with: { version: 1.226.4 }
      - name: Validate migrations directory (CI-style gate)
        run: node scripts/db-migrations-check.mjs
      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
      - name: Push pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}" --include-all

  consumer:
    needs: db-migrations
    if: always()   # deploy even if the best-effort db-migrations job errored
    name: Deploy consumer (react/)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allow the diagnostic step to push the vercel-diag branch
    environment:
      name: production-consumer
      url: ${{ steps.deploy.outputs.url }}
    defaults: { run: { working-directory: react } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: react/package-lock.json }
      - run: npm install -g vercel@latest
      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CONSUMER_PROJECT_ID }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CONSUMER_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
      - name: Deploy
        id: deploy
        run: |
          set +e   # never abort
          TOK=${{ secrets.VERCEL_TOKEN }}
          URL=$(vercel deploy --prebuilt --prod --token=$TOK)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice title=Consumer deployed::$URL"
          # Best-effort production-domain repoint.
          PROMOTE=$(vercel promote "$URL" --token=$TOK --yes 2>&1)
          ALIAS=$(vercel alias set "$URL" react-taupe-xi.vercel.app --token=$TOK 2>&1)
          # Annotations get dropped; write the full topology to a file and
          # push it to a throwaway `vercel-diag` branch (reliable to read).
          {
            echo "deployed_url: $URL"
            echo "=== whoami ==="; vercel whoami --token=$TOK 2>&1
            echo "=== teams ls ==="; vercel teams ls --token=$TOK 2>&1
            echo "=== project ls ==="; vercel project ls --token=$TOK 2>&1
            echo "=== domains ls ==="; vercel domains ls --token=$TOK 2>&1
            echo "=== alias ls ==="; vercel alias ls --token=$TOK 2>&1
            echo "=== inspect react-taupe-xi.vercel.app ==="; vercel inspect react-taupe-xi.vercel.app --token=$TOK 2>&1
            echo "=== promote output ==="; echo "$PROMOTE"
            echo "=== alias-set output ==="; echo "$ALIAS"
          } > "$GITHUB_WORKSPACE/vercel-diag.txt" 2>&1
          cd "$GITHUB_WORKSPACE"
          git config user.email ci@finflow.local
          git config user.name ci-diag
          git add -f vercel-diag.txt
          git commit -m "ci: vercel topology diag" 2>&1 | tail -1
          git push -f origin HEAD:refs/heads/vercel-diag 2>&1 | tail -2
          exit 0
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_CONSUMER_PROJECT_ID }}

  admin:
    needs: db-migrations
    if: always()   # deploy even if the best-effort db-migrations job errored
    name: Deploy admin (admin/)
    runs-on: ubuntu-latest
    environment:
      name: production-admin
      url: ${{ steps.deploy.outputs.url }}
    defaults: { run: { working-directory: admin } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: admin/package-lock.json }
      - run: npm install -g vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice title=Admin deployed::$URL"
          # Pin the public production alias explicitly (see consumer job note).
          vercel alias set "$URL" finflow-admin.vercel.app --token=${{ secrets.VERCEL_TOKEN }} \
            || { echo "::warning title=alias failed::could not point finflow-admin.vercel.app at $URL"; vercel inspect "$URL" --token=${{ secrets.VERCEL_TOKEN }} || true; }
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

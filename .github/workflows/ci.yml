name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consumer:
    name: Consumer app (react/)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: react } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          # Build verifies regardless of whether real Supabase env is provided —
          # the app gracefully falls back to LocalStorageAdapter without these.
          VITE_SUPABASE_URL: ''
          VITE_SUPABASE_ANON_KEY: ''
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: consumer-dist
          path: react/dist
          retention-days: 7

  admin:
    name: Admin app (admin/)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: admin } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: admin-dist
          path: admin/dist
          retention-days: 7

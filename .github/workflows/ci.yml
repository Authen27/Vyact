name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single source of truth for the static + unit + build gates. Runs the
  # governed automation reporter, which writes a readable evidence folder
  # (automation-runs/<ts>__<sha>/report.md) and fails the job on any gate failure.
  # See docs/TEST_GOVERNANCE.md.
  automation:
    name: Automation gates (lint · unit · build) + report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Install consumer deps
        working-directory: react
        run: npm ci
      - name: Install admin deps
        working-directory: admin
        run: npm ci
      - name: Run automation gates + generate report
        run: node scripts/automation-run.mjs
      - name: Upload automation run report (governance evidence)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: automation-run-report
          path: automation-runs/
          retention-days: 90
      - name: Upload consumer build
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: consumer-dist
          path: react/dist
          retention-days: 7
      - name: Upload admin build
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist
          retention-days: 7

  e2e:
    name: E2E — Lane A (local-only)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: react } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react/package-lock.json
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E (builds + serves in local-only mode automatically)
        run: npm run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: react/playwright-report
          retention-days: 7

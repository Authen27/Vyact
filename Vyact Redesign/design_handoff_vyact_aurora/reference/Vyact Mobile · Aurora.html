<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Vyact · Mobile (Aurora)</title>
<link rel="stylesheet" href="vyact-tokens-v2.css" />
<style>
  /* Coral accent (pip) override — chosen direction. After token file so it wins. */
  [data-vy-theme="dark"]  { --vy-accent: #EC8474; --vy-accent-ink: #2A1712; }
  [data-vy-theme="light"] { --vy-accent: #E26D5C; --vy-accent-ink: #2A1712; }

  html, body { margin: 0; padding: 0; background: #0a0f11; }
  #root { min-height: 100vh; }
  @keyframes vy-spin { to { transform: rotate(360deg); } }
  .vy-spin { width: 16px; height: 16px; border-radius: 50%; border: 2px solid currentColor; border-top-color: transparent; opacity: .8; animation: vy-spin .7s linear infinite; }
  @keyframes vy-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(4px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(2px); } }
  @keyframes vy-confetti { 0% { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translate(var(--cx), var(--cy)) rotate(var(--cr)) scale(.6); } }
  @keyframes vy-draw { to { stroke-dashoffset: 0; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#0F181B"/>
    <rect x="34" y="20" width="32" height="60" rx="8" fill="none" stroke="url(#g)" stroke-width="3"/>
    <circle cx="50" cy="42" r="8" fill="#EC8474"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#38C89B"/><stop offset="0.5" stop-color="#6D7CF0"/><stop offset="1" stop-color="#B08CF5"/></linearGradient></defs>
  </svg>
</template>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="vy-components.jsx"></script>
<script type="text/babel" src="vy-mobile.jsx"></script>
</body>
</html>

<link rel="stylesheet" href="vyact-tokens-v2.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--vy-canvas); }
  #root { min-height: 100vh; }
  @keyframes vy-spin { to { transform: rotate(360deg); } }
  .vy-spin { width: 16px; height: 16px; border-radius: 50%; border: 2px solid currentColor; border-top-color: transparent; opacity: .8; animation: vy-spin .7s linear infinite; }
  @keyframes vy-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes vy-pop { from { opacity: 0; transform: translateY(-8px) scale(.98); } to { opacity: 1; transform: none; } }
</style>
